name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Markdown XSS test
        working-directory: web
        run: npm run test:xss

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build embedded CLI clients
        run: sh scripts/build-cli.sh

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build server
        run: go build -o deaddrop .

      - name: Relay smoke test
        run: |
          ./deaddrop & SERVER=$!
          sleep 1
          node web/smoke.mjs
          kill "$SERVER"
